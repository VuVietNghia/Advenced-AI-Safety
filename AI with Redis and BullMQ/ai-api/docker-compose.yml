version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: ai-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data          # Persist Redis data qua restart
    restart: unless-stopped
    command: redis-server --appendonly yes   # AOF persistence

volumes:
  redis_data:
    driver: local
